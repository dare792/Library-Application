{% extends "layout.html" %}
{% block body %}

<section style="display: flex; justify-content: center;">
    <div class="login-panel">
        <div>
            <!-- Display flashed error messages -->
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="error-message bungee white">
                        {% for message in messages %}
                            <p class="error-text">{{ message }}</p>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}
            
            <form class="login-form" autocomplete="off" action="/login" method="POST" id="login-form">
                <div class="form-group">
                    <input name="email_or_username" placeholder="Email or Username" required>
                </div>

                <div class="form-group">
                    <input type="password" id="password" name="password" placeholder="Password" required>
                </div>

                <button type="submit" class="w3-button submit-btn">Login</button>
            </form>

            <p style="text-align: center; margin-top: 1em;">
                Don't have an account? <a href="/signup">Sign up here</a>
            </p>
        </div>
    </div>
</section>

<script src="{{ url_for('static', filename='auth-validation.js') }}"></script>
{% endblock %}
