{% extends "layout.html" %}
{% block body %}

<section style="display: flex; justify-content: center;">
    <div class="signup-panel">
        <div>
            <!-- Display flashed error messages -->
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="error-messages">
                        {% for message in messages %}
                            <p class="error-text">{{ message }}</p>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}
            
            <form action="/signup" method="POST" id="signup-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Choose a username" required>
                </div>

                <div class="form-group">
                    <label for="first_name">First Name</label>
                    <input type="text" id="first_name" name="first_name" placeholder="Enter your first name" required>
                </div>

                <div class="form-group">
                    <label for="last_name">Last Name</label>
                    <input type="text" id="last_name" name="last_name" placeholder="Enter your last name" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    <div id="password-strength" class="password-strength" style="margin-top: 0.5em;">
                        <div class="strength-meter">
                            <div class="strength-meter-fill" id="strength-meter-fill"></div>
                        </div>
                        <p class="strength-text" id="strength-text">Password strength: Weak</p>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm your password" required>
                    <p class="match-text" id="match-text" style="margin-top: 0.3em;"></p>
                </div>

                <button type="submit" class="submit-btn" id="submit-btn">Create Account</button>
            </form>

            <p style="text-align: center; margin-top: 1em;">
                Already have an account? <a href="/login">Log in here</a>
            </p>
        </div>
    </div>
</section>

<script src="{{ url_for('static', filename='auth-validation.js') }}"></script>
{% endblock %}
